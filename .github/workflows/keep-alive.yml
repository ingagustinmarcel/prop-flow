name: Supabase Keep-Alive

# Runs every 3 days at midnight UTC to prevent Supabase from pausing the project.
# Supabase pauses free-tier projects after 7 days of inactivity.
on:
  schedule:
    - cron: '0 0 */3 * *'  # Every 3 days at midnight UTC
  workflow_dispatch:        # Allow manual triggering from the GitHub UI

jobs:
  ping-database:
    name: Ping Supabase Database
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Ping Supabase (Keep-Alive)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/check-db.js
